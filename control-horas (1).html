<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Teke Teke · Control de Horas</title>
<style>
  :root{
    --naranja:#E8601C;
    --naranja-oscuro:#C74E14;
    --verde:#2E9E5B;
    --verde-oscuro:#237E48;
    --rojo:#D64545;
    --rojo-oscuro:#B03636;
    --crema:#FFF8F0;
    --texto:#3A2A20;
    --texto-suave:#8A7A6D;
    --borde:#F0E0D0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--crema);
    color:var(--texto);
    min-height:100vh;
    padding:16px;
  }
  .wrap{max-width:480px;margin:0 auto;}
  header{text-align:center;margin:8px 0 20px;}
  header h1{font-size:1.4rem;margin:0 0 2px;color:var(--naranja-oscuro);}
  header p{margin:0;color:var(--texto-suave);font-size:0.85rem;}

  .card{
    background:#fff;
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
    box-shadow:0 2px 10px rgba(200,120,60,0.08);
    border:1px solid var(--borde);
  }

  select{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1.5px solid var(--borde);
    font-size:1rem;
    background:#fff;
    color:var(--texto);
    margin-bottom:10px;
  }

  .add-emp{
    display:flex;
    gap:8px;
    margin-top:6px;
  }
  .add-emp input{
    flex:1;
    padding:10px;
    border-radius:10px;
    border:1.5px solid var(--borde);
    font-size:0.9rem;
  }
  .add-emp button{
    padding:10px 14px;
    border-radius:10px;
    border:none;
    background:var(--naranja);
    color:#fff;
    font-weight:600;
    font-size:0.9rem;
  }

  .estado{
    text-align:center;
    padding:10px 0 18px;
  }
  .estado .reloj{
    font-size:2.1rem;
    font-weight:700;
    color:var(--naranja-oscuro);
    letter-spacing:1px;
  }
  .estado .fecha{
    color:var(--texto-suave);
    font-size:0.85rem;
    margin-top:2px;
  }
  .estado .status-msg{
    margin-top:10px;
    font-size:0.95rem;
    font-weight:600;
  }
  .status-trabajando{color:var(--verde-oscuro);}
  .status-libre{color:var(--texto-suave);}

  .btn-marcar{
    width:100%;
    padding:20px;
    border:none;
    border-radius:14px;
    font-size:1.2rem;
    font-weight:700;
    color:#fff;
    cursor:pointer;
    transition:transform 0.1s;
  }
  .btn-marcar:active{transform:scale(0.98);}
  .btn-entrada{background:var(--verde);}
  .btn-entrada:hover{background:var(--verde-oscuro);}
  .btn-salida{background:var(--rojo);}
  .btn-salida:hover{background:var(--rojo-oscuro);}
  .btn-marcar:disabled{background:#ccc;cursor:not-allowed;}

  .resumen{
    display:flex;
    gap:10px;
    margin-bottom:16px;
  }
  .resumen-box{
    flex:1;
    background:#fff;
    border-radius:14px;
    padding:14px;
    text-align:center;
    border:1px solid var(--borde);
  }
  .resumen-box .num{font-size:1.4rem;font-weight:700;color:var(--naranja-oscuro);}
  .resumen-box .label{font-size:0.75rem;color:var(--texto-suave);margin-top:2px;}

  h2.section-title{
    font-size:0.95rem;
    color:var(--texto-suave);
    text-transform:uppercase;
    letter-spacing:0.5px;
    margin:0 0 10px;
  }

  table{width:100%;border-collapse:collapse;font-size:0.85rem;}
  th{
    text-align:left;
    color:var(--texto-suave);
    font-weight:600;
    padding:6px 4px;
    border-bottom:1.5px solid var(--borde);
    font-size:0.75rem;
    text-transform:uppercase;
  }
  td{padding:8px 4px;border-bottom:1px solid var(--borde);}
  tr:last-child td{border-bottom:none;}
  .horas-cell{font-weight:700;color:var(--verde-oscuro);}
  .empty-msg{text-align:center;color:var(--texto-suave);padding:20px 0;font-size:0.9rem;}
  .del-btn{
    background:none;border:none;color:#c0392b;font-size:1rem;cursor:pointer;padding:2px 6px;
  }
  .loading{text-align:center;padding:30px;color:var(--texto-suave);}

  .lock-link{
    display:block;
    text-align:center;
    color:var(--texto-suave);
    font-size:0.8rem;
    padding:14px 0 4px;
    background:none;
    border:none;
    width:100%;
    cursor:pointer;
  }
  .lock-link:hover{color:var(--naranja-oscuro);}

  .modal-overlay{
    position:fixed;
    inset:0;
    background:rgba(58,42,32,0.45);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:100;
  }
  .modal-box{
    background:#fff;
    border-radius:16px;
    padding:24px;
    max-width:400px;
    width:100%;
  }
  .modal-box h3{margin:0 0 6px;color:var(--naranja-oscuro);font-size:1.1rem;}
  .modal-box p{margin:0 0 14px;color:var(--texto-suave);font-size:0.85rem;}
  .modal-box input[type="password"]{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1.5px solid var(--borde);
    font-size:1rem;
    margin-bottom:10px;
  }
  .modal-actions{display:flex;gap:8px;}
  .modal-actions button{
    flex:1;
    padding:12px;
    border-radius:10px;
    border:none;
    font-weight:600;
    font-size:0.9rem;
    cursor:pointer;
  }
  .btn-primario{background:var(--naranja);color:#fff;}
  .btn-secundario{background:var(--crema);color:var(--texto);}
  .modal-error{color:var(--rojo-oscuro);font-size:0.82rem;margin:-4px 0 10px;}

  .rate-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .rate-row label{flex:1;font-size:0.9rem;color:var(--texto);}
  .rate-row input[type="number"]{
    width:100px;
    padding:10px;
    border-radius:10px;
    border:1.5px solid var(--borde);
    font-size:0.95rem;
    text-align:right;
  }

  .periodo-tabs{
    display:flex;
    gap:6px;
    margin-bottom:14px;
  }
  .periodo-tabs button{
    flex:1;
    padding:9px 4px;
    border-radius:10px;
    border:1.5px solid var(--borde);
    background:#fff;
    color:var(--texto-suave);
    font-size:0.8rem;
    font-weight:600;
    cursor:pointer;
  }
  .periodo-tabs button.activo{
    background:var(--naranja);
    border-color:var(--naranja);
    color:#fff;
  }

  .custom-dates{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .custom-dates input{
    flex:1;
    padding:9px;
    border-radius:10px;
    border:1.5px solid var(--borde);
    font-size:0.85rem;
  }

  .pago-total{
    background:var(--crema);
    border-radius:14px;
    padding:18px;
    text-align:center;
    margin-top:6px;
  }
  .pago-total .monto{font-size:1.8rem;font-weight:700;color:var(--verde-oscuro);}
  .pago-total .detalle{font-size:0.8rem;color:var(--texto-suave);margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🕐 Teke Teke</h1>
    <p>Control de horas de trabajo</p>
  </header>

  <div id="app" class="loading">Cargando...</div>

  <button class="lock-link" onclick="abrirModalAdmin()">🔒 Panel de pagos (solo administrador)</button>

  <div id="admin-panel"></div>
</div>

<div id="modal-container"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAXww3O8iq6ROD_Sogzv4FwEb8yxu9yoUg",
  authDomain: "finanzas-teke-teke.firebaseapp.com",
  projectId: "finanzas-teke-teke",
  storageBucket: "finanzas-teke-teke.firebasestorage.app",
  messagingSenderId: "985545936013",
  appId: "1:985545936013:web:f93bf2ea0a66c2731d26c4",
  measurementId: "G-B3BVL6ETWL"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
db.settings({ experimentalForceLongPolling: true, merge: true });

// Guardamos todo en una zona separada de tus datos financieros:
const metaRef = db.collection('control_horas').doc('meta');       // empleados + sesiones activas
const adminRef = db.collection('control_horas').doc('admin');     // contraseña + tarifas
const registrosRef = db.collection('control_horas_registros');    // cada entrada/salida marcada

let employees = [];
let activeSessions = {};
let records = [];
let selectedEmployee = null;
let tickTimer = null;

let adminConfig = null; // { password, rates: {name: number} }
let adminUnlocked = false;
let adminEmployee = null;
let adminPeriodo = 'semana'; // 'semana' | 'mes' | 'custom'
let adminCustomFrom = null;
let adminCustomTo = null;

function fmtTime(d){
  return d.toLocaleTimeString('es-ES',{hour:'numeric',minute:'2-digit',hour12:true});
}
function fmtDate(d){
  return d.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
}
function todayKey(d){
  return d.toISOString().slice(0,10);
}
function hoursBetween(inISO, outISO){
  return (new Date(outISO) - new Date(inISO)) / 3600000;
}
function fmtHours(h){
  const hh = Math.floor(h);
  const mm = Math.round((h-hh)*60);
  return hh + 'h ' + (mm<10?'0':'') + mm + 'm';
}

async function loadAll(){
  try{
    const [metaSnap, adminSnap, regSnap] = await Promise.all([
      metaRef.get(),
      adminRef.get(),
      registrosRef.orderBy('checkIn','desc').limit(500).get()
    ]);
    const meta = metaSnap.exists ? metaSnap.data() : null;
    employees = (meta && meta.employees && meta.employees.length) ? meta.employees : ['Valentina'];
    activeSessions = (meta && meta.activeSessions) ? meta.activeSessions : {};
    adminConfig = adminSnap.exists ? adminSnap.data() : null;
    records = regSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    selectedEmployee = employees[0];
    adminEmployee = employees[0];
    render();
    if(tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(updateClock, 1000);
  }catch(e){
    console.error(e);
    document.getElementById('app').innerHTML = '<div class="empty-msg">No se pudo conectar con la base de datos. Revisá tu conexión e intentá de nuevo.</div>';
  }
}

async function saveMeta(){
  await metaRef.set({ employees, activeSessions }, { merge: true });
}
async function saveAdminConfig(){
  await adminRef.set(adminConfig, { merge: true });
}

function updateClock(){
  const relojEl = document.getElementById('reloj-actual');
  if(relojEl){
    const now = new Date();
    relojEl.textContent = fmtTime(now);
  }
}

async function marcarEntrada(){
  const now = new Date().toISOString();
  activeSessions[selectedEmployee] = now;
  await saveMeta();
  render();
}

async function marcarSalida(){
  const inISO = activeSessions[selectedEmployee];
  if(!inISO) return;
  const outISO = new Date().toISOString();
  const hrs = hoursBetween(inISO, outISO);
  const nuevoRegistro = {
    employee: selectedEmployee,
    date: todayKey(new Date(inISO)),
    checkIn: inISO,
    checkOut: outISO,
    hours: hrs
  };
  delete activeSessions[selectedEmployee];
  const docRef = await registrosRef.add(nuevoRegistro);
  records.unshift({ id: docRef.id, ...nuevoRegistro });
  await saveMeta();
  render();
}

async function borrarRegistro(id){
  if(!confirm('¿Borrar este registro?')) return;
  await registrosRef.doc(id).delete();
  records = records.filter(r=>r.id!==id);
  render();
}

async function agregarEmpleado(){
  const input = document.getElementById('nuevo-emp-input');
  const name = input.value.trim();
  if(!name) return;
  if(employees.includes(name)){ input.value=''; return; }
  employees.push(name);
  await saveMeta();
  selectedEmployee = name;
  input.value='';
  render();
}

function weekStart(d){
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day===0? -6 : 1-day; // lunes como inicio
  dt.setDate(dt.getDate()+diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function getEmployeeRecords(name){
  return records.filter(r=>r.employee===name).sort((a,b)=> new Date(b.checkIn)-new Date(a.checkIn));
}

function render(){
  const app = document.getElementById('app');
  const empRecords = getEmployeeRecords(selectedEmployee);
  const isWorking = !!activeSessions[selectedEmployee];

  const wStart = weekStart(new Date());
  const weekHours = empRecords
    .filter(r => new Date(r.checkIn) >= wStart)
    .reduce((s,r)=>s+r.hours,0);

  const now = new Date();
  const monthHours = empRecords
    .filter(r=>{
      const d = new Date(r.checkIn);
      return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    })
    .reduce((s,r)=>s+r.hours,0);

  let currentSessionMsg = '';
  if(isWorking){
    const inTime = new Date(activeSessions[selectedEmployee]);
    currentSessionMsg = `<div class="status-msg status-trabajando">✅ Trabajando desde las ${fmtTime(inTime)}</div>`;
  } else {
    currentSessionMsg = `<div class="status-msg status-libre">Sin marcar entrada</div>`;
  }

  const empOptions = employees.map(e=>
    `<option value="${e}" ${e===selectedEmployee?'selected':''}>${e}</option>`
  ).join('');

  const rows = empRecords.slice(0,20).map(r=>{
    const d = new Date(r.checkIn);
    const inT = fmtTime(new Date(r.checkIn));
    const outT = fmtTime(new Date(r.checkOut));
    return `<tr>
      <td>${fmtDate(d)}</td>
      <td>${inT}</td>
      <td>${outT}</td>
      <td class="horas-cell">${fmtHours(r.hours)}</td>
      <td><button class="del-btn" onclick="borrarRegistro('${r.id}')">🗑️</button></td>
    </tr>`;
  }).join('');

  app.innerHTML = `
    <div class="card">
      <select id="emp-select" onchange="cambiarEmpleado(this.value)">
        ${empOptions}
      </select>
      <div class="add-emp">
        <input id="nuevo-emp-input" type="text" placeholder="Agregar otra persona...">
        <button onclick="agregarEmpleado()">+ Agregar</button>
      </div>
    </div>

    <div class="card estado">
      <div class="reloj" id="reloj-actual">${fmtTime(new Date())}</div>
      <div class="fecha">${fmtDate(new Date())}</div>
      ${currentSessionMsg}
    </div>

    <div class="card">
      ${isWorking
        ? `<button class="btn-marcar btn-salida" onclick="marcarSalida()">🔴 Marcar Salida</button>`
        : `<button class="btn-marcar btn-entrada" onclick="marcarEntrada()">🟢 Marcar Entrada</button>`
      }
    </div>

    <div class="resumen">
      <div class="resumen-box">
        <div class="num">${fmtHours(weekHours)}</div>
        <div class="label">Esta semana</div>
      </div>
      <div class="resumen-box">
        <div class="num">${fmtHours(monthHours)}</div>
        <div class="label">Este mes</div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Historial — ${selectedEmployee}</h2>
      ${empRecords.length===0
        ? `<div class="empty-msg">Todavía no hay registros</div>`
        : `<table>
            <thead><tr><th>Día</th><th>Entrada</th><th>Salida</th><th>Horas</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>`
      }
    </div>
  `;
}

function cambiarEmpleado(name){
  selectedEmployee = name;
  render();
}

// ---------- Panel de pagos (admin) ----------

function abrirModalAdmin(){
  const modal = document.getElementById('modal-container');
  const esNuevo = !adminConfig || !adminConfig.password;

  if(esNuevo){
    modal.innerHTML = `
      <div class="modal-overlay">
        <div class="modal-box">
          <h3>Crear contraseña</h3>
          <p>Es la primera vez que abrís el panel de pagos. Elegí una contraseña para protegerlo.</p>
          <input type="password" id="pw-nueva1" placeholder="Nueva contraseña">
          <input type="password" id="pw-nueva2" placeholder="Repetir contraseña">
          <div id="pw-error" class="modal-error" style="display:none;"></div>
          <div class="modal-actions">
            <button class="btn-secundario" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-primario" onclick="crearPassword()">Crear</button>
          </div>
        </div>
      </div>`;
  } else {
    modal.innerHTML = `
      <div class="modal-overlay">
        <div class="modal-box">
          <h3>🔒 Panel de pagos</h3>
          <p>Ingresá la contraseña de administrador.</p>
          <input type="password" id="pw-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')verificarPassword()">
          <div id="pw-error" class="modal-error" style="display:none;"></div>
          <div class="modal-actions">
            <button class="btn-secundario" onclick="cerrarModal()">Cancelar</button>
            <button class="btn-primario" onclick="verificarPassword()">Entrar</button>
          </div>
        </div>
      </div>`;
    setTimeout(()=>{ const el = document.getElementById('pw-input'); if(el) el.focus(); }, 50);
  }
}

function cerrarModal(){
  document.getElementById('modal-container').innerHTML = '';
}

async function crearPassword(){
  const p1 = document.getElementById('pw-nueva1').value;
  const p2 = document.getElementById('pw-nueva2').value;
  const err = document.getElementById('pw-error');
  if(!p1 || p1.length<4){
    err.textContent = 'La contraseña debe tener al menos 4 caracteres.';
    err.style.display='block';
    return;
  }
  if(p1 !== p2){
    err.textContent = 'Las contraseñas no coinciden.';
    err.style.display='block';
    return;
  }
  adminConfig = { password: p1, rates: {} };
  await saveAdminConfig();
  adminUnlocked = true;
  cerrarModal();
  renderAdminPanel();
}

function verificarPassword(){
  const val = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-error');
  if(val === adminConfig.password){
    adminUnlocked = true;
    cerrarModal();
    renderAdminPanel();
  } else {
    err.textContent = 'Contraseña incorrecta.';
    err.style.display = 'block';
  }
}

function cerrarPanelAdmin(){
  adminUnlocked = false;
  document.getElementById('admin-panel').innerHTML = '';
}

function cambiarAdminEmpleado(name){
  adminEmployee = name;
  renderAdminPanel();
}

function cambiarPeriodo(p){
  adminPeriodo = p;
  renderAdminPanel();
}

function actualizarFechaCustom(campo, valor){
  if(campo==='from') adminCustomFrom = valor;
  else adminCustomTo = valor;
  renderAdminPanel();
}

async function actualizarTarifa(valor){
  const rate = parseFloat(valor);
  if(!adminConfig.rates) adminConfig.rates = {};
  adminConfig.rates[adminEmployee] = isNaN(rate) ? 0 : rate;
  await saveAdminConfig();
}

function getPeriodoRange(){
  const now = new Date();
  if(adminPeriodo === 'semana'){
    const start = weekStart(now);
    const end = new Date(start);
    end.setDate(end.getDate()+7);
    return {start, end};
  }
  if(adminPeriodo === 'mes'){
    const start = new Date(now.getFullYear(), now.getMonth(), 1);
    const end = new Date(now.getFullYear(), now.getMonth()+1, 1);
    return {start, end};
  }
  // custom
  const start = adminCustomFrom ? new Date(adminCustomFrom+'T00:00:00') : weekStart(now);
  const end = adminCustomTo ? new Date(adminCustomTo+'T23:59:59') : now;
  return {start, end};
}

function renderAdminPanel(){
  const panel = document.getElementById('admin-panel');
  if(!adminUnlocked){ panel.innerHTML=''; return; }

  const rate = (adminConfig.rates && adminConfig.rates[adminEmployee]) || 0;
  const {start, end} = getPeriodoRange();
  const empRecords = getEmployeeRecords(adminEmployee);
  const periodoHoras = empRecords
    .filter(r=>{
      const d = new Date(r.checkIn);
      return d >= start && d < end;
    })
    .reduce((s,r)=>s+r.hours,0);
  const totalPagar = periodoHoras * rate;

  const empOptions = employees.map(e=>
    `<option value="${e}" ${e===adminEmployee?'selected':''}>${e}</option>`
  ).join('');

  panel.innerHTML = `
    <div class="card">
      <h2 class="section-title">💰 Panel de pagos</h2>
      <select onchange="cambiarAdminEmpleado(this.value)">${empOptions}</select>

      <div class="rate-row">
        <label>Pago por hora ($)</label>
        <input type="number" min="0" step="0.5" value="${rate}" onchange="actualizarTarifa(this.value)">
      </div>

      <div class="periodo-tabs">
        <button class="${adminPeriodo==='semana'?'activo':''}" onclick="cambiarPeriodo('semana')">Esta semana</button>
        <button class="${adminPeriodo==='mes'?'activo':''}" onclick="cambiarPeriodo('mes')">Este mes</button>
        <button class="${adminPeriodo==='custom'?'activo':''}" onclick="cambiarPeriodo('custom')">Personalizado</button>
      </div>

      ${adminPeriodo==='custom' ? `
        <div class="custom-dates">
          <input type="date" value="${adminCustomFrom||''}" onchange="actualizarFechaCustom('from', this.value)">
          <input type="date" value="${adminCustomTo||''}" onchange="actualizarFechaCustom('to', this.value)">
        </div>
      ` : ''}

      <div class="pago-total">
        <div class="monto">$${totalPagar.toFixed(2)}</div>
        <div class="detalle">${fmtHours(periodoHoras)} trabajadas × $${rate}/h</div>
      </div>

      <button class="lock-link" onclick="cerrarPanelAdmin()" style="margin-top:14px;">🔒 Cerrar panel de pagos</button>
    </div>
  `;
}

// exponer funciones globales para los onclick inline
